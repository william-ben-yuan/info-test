<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-grid">
    <div class="field">
      <label>Placa</label>
      <input formControlName="placa" />
    </div>
    <div class="field">
      <label>Chassi</label>
      <input formControlName="chassi" />
    </div>
    <div class="field">
      <label>Renavam</label>
      <input formControlName="renavam" />
    </div>
    <div class="field">
      <label>Modelo</label>
      <input formControlName="modelo" />
    </div>
    <div class="field">
      <label>Marca</label>
      <input formControlName="marca" />
    </div>
    <div class="field">
      <label>Ano</label>
      <input formControlName="ano" type="number" />
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn-cancel" (click)="cancel.emit()">Cancelar</button>
    <button type="submit" class="btn-primary">Salvar</button>
  </div>
</form>
